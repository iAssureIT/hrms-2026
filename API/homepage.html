<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Our Website</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 40px;
        }

        .btn {
            background-color: #ff6b6b;
            color: #fff;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #ff4f4f;
        }

        svg {
            width: 200px;
            height: 200px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path fill="#ff6b6b"
                d="M3 17c-.552 0-1-.448-1-1V6c0-.552.448-1 1-1h18c.552 0 1 .448 1 1v10c0 .552-.448 1-1 1H3zm0 2h18c1.103 0 2-.897 2-2V6c0-1.103-.897-2-2-2H3c-1.103 0-2 .897-2 2v10c0 1.103.897 2 2 2zM12 9.7c-.552 0-1 .448-1 1v4.6c0 .552.448 1 1 1s1-.448 1-1v-4.6c0-.552-.448-1-1-1z" />
        </svg>
        <h1>Welcome to Our Website</h1>
        <p>Discover amazing things await you!</p>
        <button class="btn">Explore Now</button>
    </div>
</body>

</html>
